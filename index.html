<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLS Certificate System</title>
<style>
body { font-family: Arial; background:#f5f5f5; margin:0; padding:20px; }
.container { max-width:700px; margin:auto; background:white; padding:30px; border-radius:12px; box-shadow:0 5px 20px rgba(0,0,0,0.05);}
h1,h2 { text-align:center; color:#1c274b; }
input, select, button { width:100%; padding:12px; margin:10px 0; border-radius:6px; border:1px solid #ccc; font-size:16px; }
button { background:#029ade; color:white; border:none; cursor:pointer; }
button:hover { background:#1c274b; }
#msg { text-align:center; margin-top:10px; }
.error { color:red; }
.success { color:green; }
#preview { display:none; text-align:center; margin-top:20px; }
#preview img { max-width:100%; border-radius:10px; border:2px solid #ddd; }
.download { display:inline-block; margin-top:10px; background:green; color:white; padding:10px 20px; border-radius:6px; text-decoration:none; }
.admin-panel { display:none; margin-top:20px; }
.admin-panel table { width:100%; border-collapse:collapse; margin-top:10px; }
.admin-panel th, .admin-panel td { border:1px solid #ccc; padding:8px; text-align:center; }
.admin-panel th { background:#029ade; color:white; }
@media(max-width:768px){.container{padding:15px;}}
</style>
</head>
<body>

<div class="container">
<h1>Serve & Lead Society Certificate Portal</h1>

<!-- MEMBER CERTIFICATE SECTION -->
<h2>Member Certificate</h2>
<select id="event">
<option value="">Select Event</option>
<option value="Orientation">Orientation Session</option>
<option value="LinkedIn">LinkedIn Profile Development</option>
<option value="Skills">Skills Completion</option>
<option value="Service">Service Award</option>
</select>
<input type="text" id="id" placeholder="Membership ID">
<input type="email" id="email" placeholder="Gmail Address">
<button onclick="generateCertificate()">Get Certificate</button>
<div id="msg"></div>

<div id="preview">
<h3>Your Certificate</h3>
<img id="certImg">
<br>
<a id="downloadBtn" class="download" download>Download Certificate</a>
</div>

<hr>

<!-- ADMIN LOGIN -->
<h2>Admin Login</h2>
<input type="text" id="adminUser" placeholder="Admin Username">
<input type="password" id="adminPass" placeholder="Admin Password">
<button onclick="adminLogin()">Login</button>
<div id="adminMsg"></div>

<div class="admin-panel" id="adminPanel">
<h2>Admin Dashboard</h2>
<table>
<thead>
<tr><th>Member ID</th><th>Name</th><th>Email</th><th>Event</th><th>Date</th><th>Certificate</th></tr>
</thead>
<tbody id="adminTableBody"></tbody>
</table>
</div>

</div>

<script>
// ========== CONFIG ==========
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwagzHdlUH4wIvZ59gddgUQDgwqVE-6aMBLYLbQv6i5N5y7bC5SajqSjHPzt8UJUqbZ8a/exec";
const ADMIN_USER = "admin";  // Change this
const ADMIN_PASS = "1234";   // Change this

// ========== MEMBER CERTIFICATE ==========
function generateCertificate(){
  const memberId = document.getElementById("id").value.trim();
  const email = document.getElementById("email").value.trim();
  const event = document.getElementById("event").value;
  const msg = document.getElementById("msg");
  if(!memberId || !email || !event){
    msg.innerHTML = "<p class='error'>Please fill all fields</p>"; return;
  }
  msg.innerHTML = "<p>Processing...</p>";

  fetch(SCRIPT_URL,{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({memberId:memberId,email:email,event:event})
  }).then(res=>res.json())
    .then(data=>{
      if(data.status=="success"){
        msg.innerHTML = "<p class='success'>Certificate generated & email sent!</p>";
        if(data.certificateUrl){
          document.getElementById("certImg").src = data.certificateUrl;
          document.getElementById("downloadBtn").href = data.certificateUrl;
          document.getElementById("preview").style.display = "block";
        }
      } else {
        msg.innerHTML = "<p class='error'>"+(data.message||"Error generating certificate")+"</p>";
        document.getElementById("preview").style.display="none";
      }
    }).catch(err=>{
      msg.innerHTML = "<p class='error'>Server error. Try later.</p>";
      console.error(err);
    });
}

// ========== ADMIN LOGIN ==========
function adminLogin(){
  const user = document.getElementById("adminUser").value.trim();
  const pass = document.getElementById("adminPass").value.trim();
  const msg = document.getElementById("adminMsg");
  const panel = document.getElementById("adminPanel");

  if(user===ADMIN_USER && pass===ADMIN_PASS){
    msg.innerHTML="<p class='success'>Welcome Admin!</p>";
    panel.style.display="block";
    loadAdminData();
  } else {
    msg.innerHTML="<p class='error'>Invalid credentials</p>";
    panel.style.display="none";
  }
}

// ========== ADMIN DATA LOAD ==========
function loadAdminData(){
  fetch(SCRIPT_URL,{
    method:"GET"
  }).then(res=>res.json())
    .then(data=>{
      const tbody = document.getElementById("adminTableBody");
      tbody.innerHTML="";
      if(data.records){
        data.records.forEach(r=>{
          tbody.innerHTML += `<tr>
            <td>${r.memberId}</td><td>${r.name}</td><td>${r.email}</td><td>${r.event}</td><td>${r.date}</td>
            <td><a href="${r.certificateUrl}" target="_blank">Download</a></td>
          </tr>`;
        });
      }
    }).catch(err=>console.error(err));
}
</script>

</body>
</html>
